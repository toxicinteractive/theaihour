<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The AI Hour — toxic.se</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep: #0f172a;
      --bg-surface: rgba(30,41,59,0.5);
      --bg-surface-active: rgba(30,41,59,0.9);
      --border: #334155;
      --border-active: #3b82f6;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --text-faint: #475569;
      --accent-blue: #3b82f6;
      --accent-blue-soft: rgba(59,130,246,0.15);
      --accent-blue-text: #93c5fd;
      --accent-purple: #8b5cf6;
      --accent-purple-soft: rgba(139,92,246,0.1);
      --accent-purple-text: #a78bfa;
      --accent-purple-border: rgba(139,92,246,0.25);
      --green-bg: #ECFDF5; --green-text: #059669; --green-border: #A7F3D0;
      --blue-bg: #EFF6FF; --blue-text: #2563EB; --blue-border: #BFDBFE;
      --amber-bg: #FEF3C7; --amber-text: #D97706; --amber-border: #FDE68A;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: linear-gradient(135deg, var(--bg-deep) 0%, #1e293b 100%);
      color: var(--text-secondary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 960px; margin: 0 auto; padding: 0 24px; }

    /* Header */
    .header { padding: 48px 0 32px; }
    .header-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .header-icon {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .header-label {
      font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500;
      color: var(--accent-purple); letter-spacing: 2px; text-transform: uppercase;
    }
    .header h1 {
      font-size: clamp(32px, 5vw, 44px); font-weight: 700; line-height: 1.1;
      background: linear-gradient(135deg, #e2e8f0, #94a3b8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .header p { font-size: 16px; color: var(--text-secondary); max-width: 540px; line-height: 1.6; }

    /* Filters */
    .filters { padding-bottom: 20px; display: flex; flex-direction: column; gap: 14px; }
    .filter-group label {
      display: block; font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
    }
    .filter-options { display: flex; gap: 5px; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 14px; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif;
      border: 1px solid var(--border); border-radius: 20px;
      background: var(--bg-surface); color: var(--text-secondary);
      cursor: pointer; transition: all 0.15s ease; white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--text-muted); color: var(--text-primary); }
    .filter-btn.active {
      border-color: var(--accent-blue); background: var(--accent-blue-soft); color: var(--accent-blue-text);
    }
    .filter-count { font-size: 14px; color: var(--text-muted); padding: 4px 0; }

    /* Grid */
    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px; padding-bottom: 80px;
    }

    /* Cards */
    .card {
      background: var(--bg-surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 20px; cursor: pointer; transition: all 0.2s ease;
      display: flex; flex-direction: column; gap: 12px;
    }
    .card:hover { border-color: var(--text-muted); }
    .card.expanded { background: var(--bg-surface-active); border-color: var(--border-active); }

    .badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge {
      font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 12px;
      border: 1px solid; white-space: nowrap;
    }
    .badge-beginner { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
    .badge-intermediate { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue-border); }
    .badge-advanced { background: var(--amber-bg); color: var(--amber-text); border-color: var(--amber-border); }
    .badge-system {
      background: var(--accent-purple-soft); color: var(--accent-purple-text);
      border-color: var(--accent-purple-border); font-weight: 500;
    }
    .badge-role {
      background: rgba(100,116,139,0.15); color: var(--text-secondary);
      border-color: rgba(100,116,139,0.25); font-weight: 500;
    }

    .card h3 { font-size: 16px; font-weight: 600; color: var(--text-primary); line-height: 1.4; }
    .card-hint { font-size: 12px; color: var(--text-faint); }
    .card-details { display: flex; flex-direction: column; gap: 12px; animation: fadeIn 0.25s ease; }
    .card-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.65; }
    .card-meta { display: flex; gap: 20px; flex-wrap: wrap; }
    .card-meta span { font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
    .card-meta .icon { color: var(--text-muted); }

    .empty {
      text-align: center; padding: 64px 0; grid-column: 1 / -1;
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty p { font-size: 16px; color: var(--text-muted); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 600px) {
      .container { padding: 0 16px; }
      .header { padding: 32px 0 24px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-brand">
      <div class="header-icon">⚡</div>
      <span class="header-label">toxic.se</span>
    </div>
    <h1>The AI Hour</h1>
    <p>20 lab-uppgifter för att accelerera din AI-mognad. Välj en som passar din roll, din nivå och ditt verktyg.</p>
  </div>

  <div class="filters">
    <div class="filter-group">
      <label>Roll</label>
      <div class="filter-options" id="filter-role"></div>
    </div>
    <div class="filter-group">
      <label>Nivå</label>
      <div class="filter-options" id="filter-level"></div>
    </div>
    <div class="filter-group">
      <label>System</label>
      <div class="filter-options" id="filter-system"></div>
    </div>
    <div class="filter-count" id="filter-count"></div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
const LABS = [
  { id:1, title:"Skriv user stories med AI", desc:"Använd Atlassian Intelligence i Jira för att generera user stories och acceptance criteria från en kort projektbeskrivning. Jämför med att skriva dem manuellt.", role:"ops", level:"beginner", system:"atlassian", time:"45 min", goal:"Snabbare och mer konsekvent kravhantering" },
  { id:2, title:"AI-sammanfattning av möten", desc:"Testa att spela in och sammanfatta ett internt möte med AI. Jämför sammanfattningen med dina egna anteckningar — vad fångade AI:n som du missade, och vice versa?", role:"ops", level:"beginner", system:"general", time:"60 min", goal:"Frigöra tid genom automatiserade mötesanteckningar" },
  { id:3, title:"Refaktorera kod med Copilot", desc:"Välj en befintlig kodfil i ett projekt och be Copilot föreslå refaktoreringar. Utvärdera förslagen: vad var bra, vad var farligt, vad lärde du dig om hur du promptar?", role:"dev", level:"beginner", system:"copilot", time:"45 min", goal:"Förstå var AI-kodassistenter hjälper och var de vilseleder" },
  { id:4, title:"Bygg en prompt-mall för säljmejl", desc:"Skapa en återanvändbar prompt-mall i Claude för att generera personaliserade säljmejl baserade på prospektinfo. Testa med 3 olika prospects och iterera på prompten.", role:"sales", level:"beginner", system:"claude", time:"45 min", goal:"Snabbare prospektering med personlig touch" },
  { id:5, title:"Designvarianter med Figma AI", desc:"Ta en befintlig designkomponent och använd Figmas AI-funktioner för att generera varianter. Utforska vad som fungerar för layout-exploration vs. detaljdesign.", role:"ux", level:"beginner", system:"figma", time:"60 min", goal:"Bredare designutforskning på kortare tid" },
  { id:6, title:"SEO-analys med AI", desc:"Mata in en av våra kunders landningssidor i Claude och be om en SEO-analys med konkreta förbättringsförslag. Jämför med vad du själv hade hittat.", role:"growth", level:"beginner", system:"claude", time:"45 min", goal:"Snabbare SEO-audits med AI som bollplank" },
  { id:7, title:"Automatisera tidsrapportering", desc:"Utforska Agiledays AI-funktioner för att effektivisera tidsrapportering och resursplanering. Dokumentera vilka funktioner som finns och hur de kan spara tid.", role:"ops", level:"intermediate", system:"agileday", time:"60 min", goal:"Minska admin-tid i projektledning" },
  { id:8, title:"Prompt engineering för kodgenerering", desc:"Testa systematiskt olika prompt-tekniker (few-shot, chain-of-thought, constraints) i Claude för att generera en komplett feature. Dokumentera vilka tekniker som ger bäst resultat.", role:"dev", level:"intermediate", system:"claude", time:"60 min", goal:"Bli bättre på att instruera AI för koduppgifter" },
  { id:9, title:"Analysera RFP:er med AI", desc:"Ladda upp en RFP eller offertförfrågan i Claude och be om en strukturerad analys: nyckelfrågor, risker, win-themes, och förslag på approach. Jämför med din egen analys.", role:"sales", level:"intermediate", system:"claude", time:"60 min", goal:"Snabbare och djupare analys av affärsmöjligheter" },
  { id:10, title:"Content-workflow med AI", desc:"Bygg ett komplett content-workflow: research → outline → draft → edit med AI som stöd i varje steg. Testa med en riktig blogpost eller social media-kampanj.", role:"growth", level:"intermediate", system:"claude", time:"60 min", goal:"End-to-end content-produktion med AI" },
  { id:11, title:"AI-driven användarresearch", desc:"Använd Claude för att analysera befintlig användardata (intervjuer, enkätsvar, supportärenden). Skapa personas och journey maps baserat på AI-analysen.", role:"ux", level:"intermediate", system:"claude", time:"60 min", goal:"Snabbare insikter från kvalitativ data" },
  { id:12, title:"Confluence-sidor med AI", desc:"Testa Atlassian Intelligence i Confluence för att generera dokumentation, mötesprotokoll och projektbeskrivningar. Utvärdera kvaliteten och hitta ditt optimala workflow.", role:"ops", level:"intermediate", system:"atlassian", time:"45 min", goal:"Bättre dokumentation med mindre effort" },
  { id:13, title:"Kodrecensioner med AI", desc:"Använd Copilot och Claude parallellt för att granska en pull request. Jämför deras feedback med manuell review — vad hittar AI som människor missar, och tvärtom?", role:"dev", level:"intermediate", system:"copilot", time:"60 min", goal:"Mer grundliga kodrecensioner" },
  { id:14, title:"A/B-test-hypoteser med AI", desc:"Ge Claude data om en sida eller kampanj och be om A/B-test-hypoteser med förväntad effekt och prioritering. Testa att iterera och förfina med uppföljningsfrågor.", role:"growth", level:"intermediate", system:"claude", time:"45 min", goal:"Mer datadrivna experiment snabbare" },
  { id:15, title:"Bygg ett AI-drivet internt verktyg", desc:"Använd Claude Code eller Artifacts för att bygga ett enkelt internt verktyg — t.ex. en offertgenerator, en projektnamn-brainstormer, eller en onboarding-guide.", role:"dev", level:"advanced", system:"claude", time:"60 min", goal:"Förstå potentialen i AI som utvecklingspartner" },
  { id:16, title:"Design system-review med AI", desc:"Mata in ert design system i Claude och be om en konsistensanalys. Hitta inkonsistenser i spacing, färger och typografi som är svåra att upptäcka manuellt.", role:"ux", level:"advanced", system:"claude", time:"60 min", goal:"Bättre design system-kvalitet" },
  { id:17, title:"AI-stödd pitch-prep", desc:"Förbered en kundpitch med AI: research om kunden, generera talking points, förutse invändningar och skapa en pitch-struktur. Testa med en riktig kommande pitch.", role:"sales", level:"advanced", system:"claude", time:"60 min", goal:"Bättre förberedda och mer träffsäkra pitchar" },
  { id:18, title:"Jira-automation med AI-regler", desc:"Utforska och konfigurera Jira Automation-regler som använder AI-funktioner — automatiska labels, prioritering, och routing av issues baserat på innehåll.", role:"ops", level:"advanced", system:"atlassian", time:"60 min", goal:"Smartare projektflöden med mindre manuellt arbete" },
  { id:19, title:"Testa AI för tillgänglighetsanalys", desc:"Använd AI för att granska en webbsida mot WCAG-riktlinjer. Jämför AI:ns findings med en manuell audit och utvärdera var AI är pålitlig nog att lita på.", role:"dev", level:"advanced", system:"claude", time:"60 min", goal:"Snabbare a11y-screening i projekten" },
  { id:20, title:"Kompetitiv analys med AI", desc:"Gör en djupanalys av en konkurrents digitala närvaro med AI som forskningsassistent: positionering, content-strategi, SEO-approach och UX-mönster.", role:"growth", level:"advanced", system:"claude", time:"60 min", goal:"Djupare konkurrentinsikter på en bråkdel av tiden" },
];

const FILTERS = {
  role: [
    { id:"all", label:"Alla" }, { id:"dev", label:"Utvecklare" }, { id:"ux", label:"UX/UI" },
    { id:"sales", label:"Sälj & Affärsutv." }, { id:"growth", label:"Growth & Marknad" }, { id:"ops", label:"Operations & PM" },
  ],
  level: [
    { id:"all", label:"Alla nivåer" }, { id:"beginner", label:"Nybörjare" },
    { id:"intermediate", label:"Mellannivå" }, { id:"advanced", label:"Avancerad" },
  ],
  system: [
    { id:"all", label:"Alla system" }, { id:"claude", label:"Claude" }, { id:"copilot", label:"Copilot" },
    { id:"atlassian", label:"Atlassian" }, { id:"agileday", label:"Agileday" },
    { id:"figma", label:"Figma" }, { id:"general", label:"Generella AI-verktyg" },
  ],
};

const LABELS = {
  level: { beginner:"Nybörjare", intermediate:"Mellannivå", advanced:"Avancerad" },
  system: { claude:"Claude", copilot:"Copilot", atlassian:"Atlassian", agileday:"Agileday", figma:"Figma", general:"Generella AI-verktyg" },
  role: { dev:"Utvecklare", ux:"UX/UI", sales:"Sälj", growth:"Growth", ops:"Operations" },
};

const state = { role:"all", level:"all", system:"all", expanded:null };

function init() {
  Object.keys(FILTERS).forEach(key => {
    const container = document.getElementById("filter-" + key);
    FILTERS[key].forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "filter-btn" + (opt.id === "all" ? " active" : "");
      btn.textContent = opt.label;
      btn.dataset.filter = key;
      btn.dataset.value = opt.id;
      btn.addEventListener("click", () => {
        state[key] = opt.id;
        state.expanded = null;
        container.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        render();
      });
      container.appendChild(btn);
    });
  });
  render();
}

function render() {
  const grid = document.getElementById("grid");
  const filtered = LABS.filter(lab =>
    (state.role === "all" || lab.role === state.role) &&
    (state.level === "all" || lab.level === state.level) &&
    (state.system === "all" || lab.system === state.system)
  );

  document.getElementById("filter-count").textContent = filtered.length + " av " + LABS.length + " labbar";

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>Inga labbar matchar dina filter. Prova att bredda sökningen.</p></div>';
    return;
  }

  grid.innerHTML = filtered.map(lab => {
    const isExpanded = state.expanded === lab.id;
    return `
      <div class="card${isExpanded ? " expanded" : ""}" data-id="${lab.id}">
        <div class="badges">
          <span class="badge badge-${lab.level}">${LABELS.level[lab.level]}</span>
          <span class="badge badge-system">${LABELS.system[lab.system]}</span>
          <span class="badge badge-role">${LABELS.role[lab.role]}</span>
        </div>
        <h3>${lab.title}</h3>
        ${isExpanded ? `
          <div class="card-details">
            <p class="card-desc">${lab.desc}</p>
            <div class="card-meta">
              <span><span class="icon">⏱</span> ${lab.time}</span>
              <span><span class="icon">🎯</span> ${lab.goal}</span>
            </div>
          </div>
        ` : '<span class="card-hint">Klicka för detaljer →</span>'}
      </div>
    `;
  }).join("");

  grid.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", () => {
      const id = parseInt(card.dataset.id);
      state.expanded = state.expanded === id ? null : id;
      render();
    });
  });
}

init();
</script>
</body>
</html>
