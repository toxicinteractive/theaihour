<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The AI Hour — Toxic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0e12;
      --surface:   #13161c;
      --surface2:  #1a1e27;
      --border:    #272c38;
      --border-hi: #3d4455;
      --text:      #e8eaf0;
      --muted:     #7a8099;
      --faint:     #454c62;

      --yellow:    #f5c800;
      --yellow-bg: rgba(245,200,0,0.08);
      --green:     #3dffa0;
      --green-bg:  rgba(61,255,160,0.07);
      --blue:      #5b8ef0;
      --blue-bg:   rgba(91,142,240,0.08);
      --pink:      #f06aaf;
      --pink-bg:   rgba(240,106,175,0.08);
      --orange:    #f08050;
      --orange-bg: rgba(240,128,80,0.08);
      --purple:    #a78bfa;
      --purple-bg: rgba(167,139,250,0.08);

      --radius: 8px;
      --font: 'Space Grotesk', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Header ───────────────────────────────── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 28px 40px;
      display: flex;
      align-items: center;
      gap: 24px;
      position: sticky;
      top: 0;
      background: rgba(12,14,18,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .logo {
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.3px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--yellow);
    }

    .header-meta {
      margin-left: auto;
      font-size: 13px;
      color: var(--muted);
      font-family: var(--mono);
    }

    #filter-count {
      color: var(--yellow);
    }

    /* ── Filter bar ───────────────────────────── */
    .filter-bar {
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--faint);
      width: 64px;
      flex-shrink: 0;
    }

    .filter-btn {
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-btn:hover {
      border-color: var(--border-hi);
      color: var(--text);
    }

    .filter-btn.active {
      background: var(--yellow);
      border-color: var(--yellow);
      color: #0c0e12;
      font-weight: 700;
    }

    /* ── Grid ─────────────────────────────────── */
    main {
      padding: 32px 40px 64px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    /* ── Cards ────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .card:hover {
      border-color: var(--border-hi);
      background: var(--surface2);
    }

    .card.expanded {
      border-color: var(--yellow);
      background: var(--surface2);
      grid-column: span 1;
    }

    .card-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .badge-beginner    { background: var(--green-bg);  color: var(--green);  }
    .badge-intermediate{ background: var(--blue-bg);   color: var(--blue);   }
    .badge-advanced    { background: var(--pink-bg);   color: var(--pink);   }

    .badge-sys-claude    { background: var(--orange-bg); color: var(--orange); }
    .badge-sys-copilot   { background: var(--blue-bg);   color: var(--blue);   }
    .badge-sys-atlassian { background: var(--blue-bg);   color: #4ec9d4;       }
    .badge-sys-figma     { background: var(--purple-bg); color: var(--purple); }
    .badge-sys-hubspot   { background: var(--orange-bg); color: #f07848;       }
    .badge-sys-slack     { background: var(--pink-bg);   color: #e08060;       }
    .badge-sys-agileday  { background: var(--green-bg);  color: var(--green);  }
    .badge-sys-general   { background: rgba(100,100,100,0.15); color: var(--muted); }

    .card h3 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .card-hint {
      font-size: 12px;
      color: var(--faint);
    }

    .card-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .card-meta {
      display: flex;
      gap: 16px;
      margin-bottom: 14px;
    }

    .card-meta span {
      font-size: 12px;
      color: var(--faint);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .card-meta .icon {
      font-size: 13px;
    }

    .card-goal {
      font-size: 13px;
      color: var(--yellow);
      font-weight: 500;
      padding: 8px 12px;
      background: var(--yellow-bg);
      border-radius: 6px;
      margin-bottom: 12px;
    }

    .card-resource {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--blue);
      text-decoration: none;
      padding: 8px 12px;
      background: var(--blue-bg);
      border-radius: 6px;
      transition: opacity 0.15s;
      font-weight: 500;
    }

    .card-resource:hover { opacity: 0.8; }

    .res-arrow { margin-left: auto; }

    /* ── Empty / Error states ─────────────────── */
    .empty, .error-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .empty-icon { font-size: 40px; margin-bottom: 16px; }

    .error-msg {
      color: #f06a6a;
      background: rgba(240,106,106,0.08);
      border: 1px solid rgba(240,106,106,0.2);
      border-radius: var(--radius);
      font-size: 14px;
    }

    /* ── Responsive ───────────────────────────── */
    @media (max-width: 640px) {
      header, .filter-bar, main { padding-left: 20px; padding-right: 20px; }
      #grid { grid-template-columns: 1fr; }
      .filter-label { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    The AI Hour
  </div>
  <div class="header-meta">
    <span id="filter-count">—</span> labbar
  </div>
</header>

<div class="filter-bar">
  <div class="filter-row">
    <span class="filter-label">Roll</span>
    <div id="filter-role"></div>
  </div>
  <div class="filter-row">
    <span class="filter-label">Nivå</span>
    <div id="filter-level"></div>
  </div>
  <div class="filter-row">
    <span class="filter-label">System</span>
    <div id="filter-system"></div>
  </div>
</div>

<main>
  <div id="grid"></div>
</main>

<script>
const FILTERS = {
  role: [
    { id: "all",    label: "Alla" },
    { id: "dev",    label: "Utvecklare" },
    { id: "ux",     label: "UX/UI" },
    { id: "sales",  label: "Sälj" },
    { id: "growth", label: "Growth & Marknad" },
    { id: "ops",    label: "Operations & PM" },
  ],
  level: [
    { id: "all",          label: "Alla nivåer" },
    { id: "beginner",     label: "Nybörjare" },
    { id: "intermediate", label: "Mellannivå" },
    { id: "advanced",     label: "Avancerad" },
  ],
  system: [
    { id: "all",       label: "Alla system" },
    { id: "claude",    label: "Claude" },
    { id: "copilot",   label: "Copilot" },
    { id: "atlassian", label: "Atlassian" },
    { id: "hubspot",   label: "HubSpot" },
    { id: "slack",     label: "Slack" },
    { id: "figma",     label: "Figma" },
    { id: "agileday",  label: "Agileday" },
    { id: "general",   label: "Generellt" },
  ],
};

const LEVEL_LABELS  = { beginner: "Nybörjare", intermediate: "Mellannivå", advanced: "Avancerad" };
const ROLE_LABELS   = { dev: "Utvecklare", ux: "UX/UI", sales: "Sälj", growth: "Growth", ops: "Operations", all: "Alla" };
const SYSTEM_LABELS = { claude: "Claude", copilot: "Copilot", atlassian: "Atlassian", figma: "Figma", hubspot: "HubSpot", slack: "Slack", agileday: "Agileday", general: "Generellt" };
const RES_ICONS     = { video: "▶", article: "📄", guide: "📘" };

const state = { role: "all", level: "all", system: "all", expanded: null };
let labs = [];

async function loadLabs() {
  try {
    const res = await fetch("labs.json");
    if (!res.ok) throw new Error(res.status);
    labs = await res.json();
    render();
  } catch (err) {
    document.getElementById("grid").innerHTML =
      '<div class="error-msg">Kunde inte ladda labbarna.<br>Kontrollera att <code>labs.json</code> finns i samma mapp som <code>index.html</code>.</div>';
  }
}

function init() {
  Object.keys(FILTERS).forEach(key => {
    const wrap = document.getElementById("filter-" + key);
    FILTERS[key].forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "filter-btn" + (opt.id === "all" ? " active" : "");
      btn.textContent = opt.label;
      btn.addEventListener("click", () => {
        state[key] = opt.id;
        state.expanded = null;
        wrap.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        render();
      });
      wrap.appendChild(btn);
    });
  });
  loadLabs();
}

function roleMatch(lab) {
  if (state.role === "all") return true;
  return lab.role === state.role || lab.role === "all";
}

function render() {
  const grid = document.getElementById("grid");
  const filtered = labs.filter(lab =>
    roleMatch(lab) &&
    (state.level  === "all" || lab.level  === state.level) &&
    (state.system === "all" || lab.system === state.system)
  );

  document.getElementById("filter-count").textContent = filtered.length + " av " + labs.length;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>Inga labbar matchar filtren. Prova att bredda sökningen.</p></div>';
    return;
  }

  grid.innerHTML = filtered.map(lab => {
    const isExp = state.expanded === lab.id;
    const r = lab.resource;
    const ico = r ? (RES_ICONS[r.type] || "🔗") : "";
    const sysLabel = SYSTEM_LABELS[lab.system] || lab.system;

    return `
      <div class="card${isExp ? " expanded" : ""}" data-id="${lab.id}">
        <div class="card-badges">
          <span class="badge badge-${lab.level}">${LEVEL_LABELS[lab.level]}</span>
          <span class="badge badge-sys-${lab.system}">${sysLabel}</span>
        </div>
        <h3>${lab.title}</h3>
        ${isExp ? `
          <p class="card-desc">${lab.desc}</p>
          <div class="card-meta">
            <span><span class="icon">⏱</span>${lab.time}</span>
          </div>
          <div class="card-goal">🎯 ${lab.goal}</div>
          ${r ? `<a class="card-resource" href="${r.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
            <span>${ico}</span>${r.label}<span class="res-arrow">→</span>
          </a>` : ""}
        ` : '<span class="card-hint">Klicka för att öppna →</span>'}
      </div>
    `;
  }).join("");

  grid.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", () => {
      const id = parseInt(card.dataset.id);
      state.expanded = state.expanded === id ? null : id;
      render();
    });
  });
}

init();
</script>
</body>
</html>
